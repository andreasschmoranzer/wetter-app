<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      div.background {
        background: lightblue url(public/starry_sky.jpg) no-repeat center;
        background-size: cover;
        align-items: center;
        display: flex;
        justify-content: center;
        height: 400px;
        width: 400px;
      }

      div.transbox {
        background-image: url("public/balloon.jpg");
        /* -webkit-backdrop-filter: blur(20px); */
        border-radius: 2rem;
        backdrop-filter: blur(1px);
        padding: 20px;
        margin: 30px;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <h1>The backdrop-filter Property</h1>

    <div class="background">
      <div class="transbox">
        <p>backdrop-filter: blur(5px)</p>
      </div>
    </div>
  </body>
</html>
